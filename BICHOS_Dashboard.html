<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BICHOS - Edge AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-8 border-b border-gray-700 pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-emerald-400 flex items-center gap-2">
                    🪲 Proyecto BICHOS
                    <span class="text-sm bg-emerald-900 text-emerald-300 px-3 py-1 rounded-full ml-4 font-normal tracking-wide">Modo Standalone (Sin Servidor)</span>
                </h1>
                <p class="text-gray-400 mt-1">Sistema de Monitoreo Entomológico Inteligente</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="esp32-ip" value="192.168.1.100" class="bg-gray-800 border border-gray-600 text-white text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block p-2" placeholder="IP ESP32-CAM">
                <button onclick="updateCameraIP()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg transition">Conectar</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Video Column -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-gray-800 p-1 rounded-2xl shadow-xl border border-gray-700">
                    <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden flex items-center justify-center">
                        <div id="video-loader" class="absolute flex flex-col items-center z-0">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-500 mb-2"></div>
                            <span class="text-gray-400 text-sm mt-2 font-medium">Ingresa la IP y presiona Conectar...</span>
                        </div>
                        <img id="camera-stream" src="" class="relative z-10 w-full h-full object-contain hidden" alt="Stream en vivo" 
                             onload="this.classList.remove('hidden'); document.getElementById('video-loader').style.display='none';" 
                             onerror="this.classList.add('hidden'); document.getElementById('video-loader').style.display='flex';">
                    </div>
                </div>

                <!-- Metrics Cards -->
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-md">
                        <p class="text-gray-400 text-sm font-medium">Capturas Totales</p>
                        <p class="text-3xl font-bold mt-1 text-white" id="stat-total">0</p>
                    </div>
                    <div class="bg-rose-900/30 p-5 rounded-xl border border-rose-800/50 shadow-md transition-all duration-300" id="card-plagas">
                        <p class="text-rose-400 text-sm font-medium">Plagas Retenidas</p>
                        <p class="text-3xl font-bold mt-1 text-rose-200" id="stat-plagas">0</p>
                    </div>
                    <div class="bg-emerald-900/30 p-5 rounded-xl border border-emerald-800/50 shadow-md transition-all duration-300" id="card-nativos">
                        <p class="text-emerald-400 text-sm font-medium">Nativos Liberados</p>
                        <p class="text-3xl font-bold mt-1 text-emerald-200" id="stat-nativos">0</p>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <button onclick="simulateDetection()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-medium py-3 px-4 rounded-xl transition border border-gray-600">Simular Detección de IA</button>
                    <button onclick="clearLogs()" class="bg-red-900/50 hover:bg-red-800/50 text-red-200 font-medium py-3 px-4 rounded-xl transition border border-red-800/50">Borrar Historial</button>
                </div>
            </div>

            <!-- Side Column -->
            <div class="space-y-6">
                <!-- Chart -->
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-md">
                    <h2 class="text-lg font-semibold mb-4 text-gray-200">Balance Poblacional</h2>
                    <div class="relative h-48 w-full flex justify-center">
                        <canvas id="populationChart"></canvas>
                    </div>
                </div>

                <!-- Log -->
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-md flex-1">
                    <h2 class="text-lg font-semibold mb-4 text-gray-200">Bitácora de Eventos</h2>
                    <div class="overflow-y-auto h-64 pr-2 custom-scrollbar">
                        <table class="w-full text-left text-sm">
                            <tbody id="log-table" class="divide-y divide-gray-700">
                                <!-- Filas generadas por JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADO Y ALMACENAMIENTO LOCAL ---
        let stats = { total: 0, plagas: 0, nativos: 0 };
        let logs = [];
        let currentESP32_IP = "";

        // Cargar desde localStorage si existe
        if(localStorage.getItem('bichos_stats')) {
            stats = JSON.parse(localStorage.getItem('bichos_stats'));
            logs = JSON.parse(localStorage.getItem('bichos_logs'));
        }

        // --- CÁMARA ---
        function updateCameraIP() {
            const ip = document.getElementById('esp32-ip').value;
            currentESP32_IP = `http://${ip}`;
            document.getElementById('camera-stream').src = `${currentESP32_IP}/stream?cb=` + Date.now();
        }

        // --- GRÁFICO ---
        const ctx = document.getElementById('populationChart').getContext('2d');
        const popChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Plagas', 'Nativos'],
                datasets: [{
                    data: [stats.plagas, stats.nativos],
                    backgroundColor: ['#fb7185', '#34d399'],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: { cutout: '75%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } }, maintainAspectRatio: false }
        });

        // --- LÓGICA PRINCIPAL ---
        function updateUI() {
            // Textos
            document.getElementById('stat-total').innerText = stats.total;
            document.getElementById('stat-plagas').innerText = stats.plagas;
            document.getElementById('stat-nativos').innerText = stats.nativos;
            
            // Gráfico
            popChart.data.datasets[0].data = [stats.plagas, stats.nativos];
            popChart.update();

            // Tabla
            const tbody = document.getElementById('log-table');
            tbody.innerHTML = '';
            logs.forEach(log => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-700/50 transition-colors';
                const textColor = log.role === 'Plaga' ? 'text-rose-400' : 'text-emerald-400';
                row.innerHTML = `
                    <td class="py-2 px-1 text-gray-400 text-xs">${log.time}</td>
                    <td class="py-2 font-medium ${textColor}">${log.species}</td>
                    <td class="py-2 text-right"><span class="text-xs bg-gray-700 px-2 py-1 rounded">${log.action}</span></td>
                `;
                tbody.appendChild(row);
            });
            
            // Guardar local
            localStorage.setItem('bichos_stats', JSON.stringify(stats));
            localStorage.setItem('bichos_logs', JSON.stringify(logs));
        }

        function clearLogs() {
            stats = { total: 0, plagas: 0, nativos: 0 };
            logs = [];
            updateUI();
        }

        function triggerServoAction() {
            if(!currentESP32_IP) return;
            // Llamamos a la ruta de la ESP32 para mover el motor
            fetch(`${currentESP32_IP}/action`)
                .then(res => console.log("Señal de escape enviada a ESP32"))
                .catch(err => console.error("Error al conectar con ESP32:", err));
        }

        function simulateDetection() {
            const isNativo = Math.random() > 0.5;
            const species = isNativo ? "Adalia angulifera" : "Agrotis ipsilon";
            const role = isNativo ? "Nativo" : "Plaga";
            const action = isNativo ? "Liberado (Rampa abierta)" : "Retenido";
            
            // Actualizar datos
            stats.total++;
            if(isNativo) stats.nativos++; else stats.plagas++;
            
            const timeStr = new Date().toLocaleTimeString();
            logs.unshift({ time: timeStr, species, role, action });
            if(logs.length > 20) logs.pop(); // Mantener solo últimos 20

            // Animar tarjeta
            const cardId = isNativo ? 'card-nativos' : 'card-plagas';
            const card = document.getElementById(cardId);
            card.classList.add('scale-105', 'ring', 'ring-white/50');
            setTimeout(() => card.classList.remove('scale-105', 'ring', 'ring-white/50'), 500);

            updateUI();

            // Si es nativo, le avisamos a la ESP32 que abra la rampa
            if(isNativo) {
                triggerServoAction();
            }
        }

        // Iniciar interfaz
        updateUI();
    </script>
</body>
</html>
